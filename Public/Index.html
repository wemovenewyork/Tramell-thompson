<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By Lolita with Love</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Order</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="social-media">
                <a href="https://www.instagram.com/bylolitawithlove/" target="_blank"><i class="fa fa-instagram" aria-hidden="true"></i></a>
                <a href="https://www.facebook.com/By-Lolita-With-Love-104355341703334/" target="_blank"><i class="fa fa-facebook" aria-hidden="true"></i></a>
                <a href="https://www.tiktok.com/@bylolitawithlove" target="_blank"><i class="fa fa-tiktok" aria-hidden="true"></i></a>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <h1>Welcome to By Lolita with Love</h1>
            <p>We offer a variety of delicious cakes and cookies, all made with love.</p>
            <img src="logo.png" alt="By Lolita with Love Logo" class="logo">
        </section>
        <section>
            <h2>Products</h2>
            <ul>
                <li>Cake</li>
                <li>Cookie</li>
            </ul>
        </section>
        <section>
            <h2>Order</h2>
            <form>
                <label>Customer Name:</label>
                <input type="text" />
                <label>Customer Email:</label>
                <input type="email" />
                <label>Order Date:</label>
                <input type="date" />
                <label>Total Cost:</label>
                <input type="number" />
                <label>Products:</label>
                <select multiple>
                    <option value="cake">Cake</option>
                    <option value="cookie">Cookie</option>
                </select>
                <button type="submit">Submit Order</button>
            </form>
        </section>
        <section>
            <h2>Contact</h2>
            <p>Email: bylolitawithlove@gmail.com</p>
            <p>Phone: 347-765-6412</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 By Lolita with Love</p>
        <div class="social-media">
            <a href="https://www.instagram.com/bylolitawithlove/" target="_blank"><i class="fa fa-instagram" aria-hidden="true"></i></a>
            <a href="https://www.facebook.com/By-Lolita-With-Love-104355341703334/" target="_blank"><i class="fa fa-facebook" aria-hidden="true"></i></a>
            <a href="https://www.tiktok.com/@bylolitawithlove" target="_blank"><i class="fa fa-tiktok" aria-hidden="true"></i></a>
        </div>
    </footer>
    <script src="bundle.js"></script>
    <script src="https://use.fontawesome.com/your-key.js"></script>
</body>
</html>
